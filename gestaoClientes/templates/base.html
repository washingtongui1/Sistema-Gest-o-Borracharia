{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borracharia Gestão</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS Global -->
  <link rel="stylesheet" href="{% static 'css/base.css' %}">

  <!-- Bloco para CSS específico das páginas -->
  {% block extra_css %}{% endblock %}
</head>

<body>

  <div class="sidebar">
    <h4 class="text-center mb-4">Gestão Borracharia</h4>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'gestao_clientes' %}">Gestão de Clientes</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Ordens de Serviço</a></li>
      <li class="nav-item"><a class="nav-link" href="{% url 'estoque_geral' %}">Estoque</a></li>
    </ul>
  </div>

  <div class="content">
    <!-- Bloco de mensagens do Django para feedback do sistema -->
    <div class="container-mensagens">
      {% if messages %}
      {% for message in messages %}
      <div class="alert {{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      {% endfor %}
      {% endif %}
    </div>

    <!-- Conteúdo principal das páginas -->
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
