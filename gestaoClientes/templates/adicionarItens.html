{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/adicionarItens.css' %}">

<div class="form-card-wide">
  <form method="POST" class="row g-3">
    {% csrf_token %}

    <div class="col-12">
      <h2>Adicionar Itens - OS #{{ id_os }}</h2>
      <p>Adicione os produtos necessários para esta ordem de serviço.</p>
    </div>

    <div class="col-12">
      <div class="table-responsive">
        <table id="tabela-produtos">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Valor Unit.</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela">
            <tr class="linha-produto">
              <td>
                <select name="produto[]" class="produto-select" onchange="atualizarValor(this)">
                  <option value="">Selecione...</option>
                  {% for p in produtos_disponiveis %}
                  <option value="{{ p.0 }}" data-preco="{{ p.2 }}">{{ p.1 }}</option>
                  {% endfor %}
                </select>
              </td>
              <td><input type="number" name="qtd[]" class="form-control" required></td>
              <td><input type="text" name="valor[]" class="form-control" required></td>
              <td><button type="button" class="btn-remover">X</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="col-12">
      <label><strong>Observações:</strong></label>
      <textarea name="observacoes"></textarea>
    </div>

    <div class="col-12">
      <strong>Total da OS: R$ </strong>
      <input type="text" id="total_os" name="total_os" readonly value="0.00">
    </div>

    <div class="col-12">
      <div class="action-group">
        <button type="button" id="btn-adicionar" class="btn-adicionar">+ Adicionar Item</button>
        <button type="submit" class="btn-salvar">Finalizar OS</button>
        <a href="{% url 'cancelar_os' id_os %}" class="btn-cancelar">Cancelar OS</a>
      </div>
    </div>
  </form>
</div>

<script src="{% static 'js/adicionarItens.js' %}"></script>
<script src="{% static 'js/bloqueioNavegacao.js' %}"></script>
{% endblock %}
